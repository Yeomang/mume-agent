name: Release & Deploy
 
on:
  push:
    branches: [main]
 
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Create release zip
        run: |
          zip -r mume-agent.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/*" \
            -x "data/*" \
            -x "pids/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".env" \
            -x ".env.example" \
            -x "log.log" \
            -x "automation_targets.json" \
            -x "deploy_info.json" \
            -x ".DS_Store" \
            -x ".vscode/*" \
            -x ".idea/*" \
            -x "CLAUDE.md" \
            -x ".gitignore" \
            -x "setup.bat"
 
      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
 
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest mume-agent.zip \
            --title "Latest Release ($(date -u +%Y-%m-%d\ %H:%M))" \
            --notes "Auto-release from commit ${{ github.sha }}" \
            --latest
 
      - name: Notify mume-console for auto-deploy
        if: vars.CONSOLE_WEBHOOK_URL != ''
        run: |
          curl -X POST "${{ vars.CONSOLE_WEBHOOK_URL }}/api/deploy/trigger" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.CONSOLE_WEBHOOK_SECRET }}" \
            -d '{
              "repo": "Yeomang/mume-agent",
              "sha": "${{ github.sha }}",
              "release_url": "https://github.com/Yeomang/mume-agent/releases/download/latest/mume-agent.zip"
            }' \
            --fail --max-time 30 || echo "::warning::Webhook 전송 실패 (비치명적)"
