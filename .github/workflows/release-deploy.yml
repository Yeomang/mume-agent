name: Release & Deploy

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release zip
        run: |
          zip -r mume-agent.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".claude/*" \
            -x "data/*" \
            -x "pids/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x ".env" \
            -x ".env.example" \
            -x "log.log" \
            -x "automation_targets.json" \
            -x "deploy_info.json" \
            -x ".DS_Store" \
            -x ".vscode/*" \
            -x ".idea/*" \
            -x "CLAUDE.md" \
            -x ".gitignore" \
            -x "setup.bat"

      - name: Update release (asset만 교체, release 삭제 안 함)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release가 없으면 생성
          if ! gh release view current > /dev/null 2>&1; then
            gh release create current mume-agent.zip \
              --title "Current Release" \
              --notes "Auto-release from commit ${{ github.sha }}" \
              --latest
          else
            # 기존 asset 삭제 후 새 asset 업로드 (release 자체는 유지)
            gh release delete-asset current mume-agent.zip --yes 2>/dev/null || true
            gh release upload current mume-agent.zip --clobber
            gh release edit current \
              --notes "Auto-release from commit ${{ github.sha }}"
          fi

      - name: Notify mume-console for auto-deploy
        if: vars.CONSOLE_WEBHOOK_URL != ''
        run: |
          curl -L -X POST "${{ vars.CONSOLE_WEBHOOK_URL }}/api/deploy/trigger" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.CONSOLE_WEBHOOK_SECRET }}" \
            -d '{
              "repo": "Yeomang/mume-agent",
              "sha": "${{ github.sha }}",
              "release_url": "https://github.com/Yeomang/mume-agent/releases/download/current/mume-agent.zip"
            }' \
            --fail --max-time 30 || echo "::warning::Webhook 전송 실패 (비치명적)"
